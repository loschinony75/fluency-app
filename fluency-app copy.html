<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluency</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* ======================
   HEADER
====================== */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background: #111;
        color: white;
      }

      nav h1 {
        margin: 0;
        font-size: 22px;
      }

      .nav-tabs {
        display: flex;
        gap: 10px;
      }

      .nav-tab {
        padding: 8px 12px;
        background: #222;
        border-radius: 6px;
        cursor: pointer;
      }

      .nav-tab.active {
        background: #444;
      }

      /* ======================
   CONTENT
====================== */
      .screen {
        padding: 20px;
      }

      .sentence-big {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .sentence-big-es {
        font-size: 22px;
        color: #555;
      }

      .btn {
        padding: 10px 15px;
        background: black;
        color: white;
        border: none;
        margin-top: 10px;
        cursor: pointer;
      }

      /* ======================
   MOBILE FIX (KEY PART)
====================== */
      @media (max-width: 600px) {
        nav {
          flex-direction: column;
          gap: 10px;
        }

        nav h1 {
          text-align: center;
          font-size: 20px;
        }

        .nav-tabs {
          flex-wrap: wrap;
          justify-content: center;
        }

        .nav-tab {
          flex: 1 1 30%;
          text-align: center;
          font-size: 12px;
        }

        select {
          width: 100%;
        }

        .sentence-big {
          font-size: 20px;
        }

        .sentence-big-es {
          font-size: 18px;
        }

        .btn {
          width: 100%;
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <!-- ======================
     HEADER
====================== -->
    <nav>
      <h1>Fluency</h1>

      <div class="nav-tabs">
        <div class="nav-tab active">Sentences</div>
        <div class="nav-tab">Shadow</div>
        <div class="nav-tab">Recall</div>
        <div class="nav-tab">Listen</div>
      </div>

      <select id="dialect">
        <option value="pr">Puerto Rican</option>
        <option value="can">Canarian</option>
      </select>
    </nav>

    <!-- ======================
     CONTENT
====================== -->
    <div class="screen">
      <div class="sentence-big">Where are you from?</div>
      <div class="sentence-big-es" id="spanishText">¿De dónde tú eres?</div>

      <button class="btn" onclick="play()">▶ Play</button>
    </div>

    <script>
      // ======================
      // VOICE SYSTEM
      // ======================
      let currentLang = 'pr';

      document.getElementById('dialect').addEventListener('change', (e) => {
        currentLang = e.target.value;

        if (currentLang === 'pr') {
          document.getElementById('spanishText').innerText =
            '¿De dónde tú eres?';
        } else {
          document.getElementById('spanishText').innerText = '¿De dónde eres?';
        }
      });

      // load voices
      function loadVoices() {
        return new Promise((resolve) => {
          let voices = speechSynthesis.getVoices();
          if (voices.length) resolve(voices);
          else
            speechSynthesis.onvoiceschanged = () =>
              resolve(speechSynthesis.getVoices());
        });
      }

      // speak function (natural)
      async function speak(text) {
        const voices = await loadVoices();

        speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.85;
        utterance.pitch = 1;

        let voice =
          currentLang === 'pr'
            ? voices.find((v) => v.lang === 'es-US') ||
              voices.find((v) => v.lang.includes('es'))
            : voices.find((v) => v.lang === 'es-ES') ||
              voices.find((v) => v.lang.includes('es'));

        if (voice) {
          utterance.voice = voice;
          utterance.lang = voice.lang;
        }

        speechSynthesis.speak(utterance);
      }

      // play button
      function play() {
        const text = document.getElementById('spanishText').innerText;
        speak(text);
      }
    </script>
  </body>
</html>
